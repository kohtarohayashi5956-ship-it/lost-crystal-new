function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function deepClone(x){return JSON.parse(JSON.stringify(x))}
function hash(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return (h>>>0).toString(16).padStart(8,'0')}
function el(tag,props={},children=[]){const n=document.createElement(tag);Object.entries(props||{}).forEach(([k,v])=>{if(k==='className')n.className=v;else if(k==='style'&&v&&typeof v==='object')Object.assign(n.style,v);else if(k.startsWith('on')&&typeof v==='function')n.addEventListener(k.slice(2).toLowerCase(),v);else if(v===true)n.setAttribute(k,'');else if(v!==false&&v!=null)n.setAttribute(k,String(v))});const arr=Array.isArray(children)?children:[children];arr.flat(Infinity).forEach(c=>{if(c==null||c===false)return;n.appendChild(c instanceof Node?c:document.createTextNode(String(c)))});return n}
let questionBuildMode=true,questionSeed=0x1a2b3c4d;
function seededRandom(){questionSeed=(Math.imul(questionSeed,1664525)+1013904223)>>>0;return questionSeed/4294967296}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const r=questionBuildMode?seededRandom():Math.random();const j=Math.floor(r*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function sample(arr,n=1){return shuffle([...new Set(arr)]).slice(0,n)}
function showToast(msg){document.querySelector('.toast')?.remove();const t=el('div',{className:'toast'},msg);document.body.appendChild(t);setTimeout(()=>t.remove(),2100)}

function migrate(s){const d=initialState();if(!s||typeof s!=='object')return d;s={...d,...s};s.appId=APP.id;s.buildings={...d.buildings,...(s.buildings||{})};s.subjectStats={...blankSubjectStats(),...(s.subjectStats||{})};Object.keys(SUBJECTS).forEach(k=>s.subjectStats[k]={total:0,correct:0,...(s.subjectStats[k]||{})});s.unitStats=s.unitStats||{};s.questionStats=s.questionStats||{};s.review=Array.isArray(s.review)?s.review:[];s.questionHistory=Array.isArray(s.questionHistory)?s.questionHistory.slice(-240):[];s.dailyHistory=Array.isArray(s.dailyHistory)?s.dailyHistory.slice(-90):[];s.storyRead=Array.isArray(s.storyRead)?s.storyRead:[];s.bossProgress=s.bossProgress||{};s.bossCleared=Array.isArray(s.bossCleared)?s.bossCleared:[];s.issues=Array.isArray(s.issues)?s.issues:[];s.settings={...d.settings,...(s.settings||{})};s.daily=s.daily||blankDaily();if(s.daily.date!==today())s.daily=blankDaily();return s}

function buildPackage(source=state,reason=null){const data=source===state?snapshot():deepClone(source);const stateJson=JSON.stringify(data);return {format:'beginning-crystal-save',appId:APP.id,schemaVersion:APP.schema,appVersion:APP.version,exportedAt:new Date().toISOString(),reason,summary:summary(data),checksum:hash(stateJson),state:data}}
function inspectPackage(parsed){if(!parsed||typeof parsed!=='object'||Array.isArray(parsed))throw new Error('セーブデータの形ではありません。');if(parsed.appId!==APP.id)throw new Error('小1版「はじまりのクリスタル」のデータではありません。');if(parsed.format!=='beginning-crystal-save'||!parsed.state)throw new Error('対応していないセーブ形式です。');const raw=parsed.state;if(parsed.checksum&&hash(JSON.stringify(raw))!==parsed.checksum)throw new Error('データが途中で欠けている可能性があります。');return {raw:deepClone(raw),summary:summary(raw),version:parsed.appVersion||'不明',exportedAt:parsed.exportedAt||null}}
function summary(s){const total=Object.values(s.subjectStats||{}).reduce((a,b)=>a+(b.total||0),0);const correct=Object.values(s.subjectStats||{}).reduce((a,b)=>a+(b.correct||0),0);return {playerName:s.playerName||'ひかり',total,correct,level:levelInfo(s.xp||0).level,sessions:s.totalSessions||0}}
function backupSignature(){return `${totalAnswered()}|${state.xp}|${state.coins}|${state.totalSessions}|${state.issues.length}`}
function createAutoBackup(reason='自動バックアップ',force=false){try{const sig=backupSignature();let meta={};try{meta=JSON.parse(localStorage.getItem(BACKUP_META)||'{}')}catch(e){}if(!force&&meta.signature===sig)return false;const pkg=buildPackage(snapshot(),reason);for(let i=BACKUP_KEYS.length-1;i>0;i--){const prev=localStorage.getItem(BACKUP_KEYS[i-1]);if(prev)localStorage.setItem(BACKUP_KEYS[i],prev)}localStorage.setItem(BACKUP_KEYS[0],JSON.stringify(pkg));localStorage.setItem(BACKUP_META,JSON.stringify({signature:sig,at:Date.now(),reason}));return true}catch(e){return false}}
function maybeAutoBackup(){if(!state.setupDone)return;const n=totalAnswered();if(n>0&&n%5===0)createAutoBackup('5問ごとの自動保存')}
function recoverCorrupt(){for(const key of BACKUP_KEYS){try{const raw=localStorage.getItem(key);if(!raw)continue;const info=inspectPackage(JSON.parse(raw));const s=migrate(info.raw);s.backupNotice=true;localStorage.setItem(STORE_KEY,JSON.stringify(s));return s}catch(e){}}return null}
function backupRows(){try{return BACKUP_KEYS.map(key=>{const raw=localStorage.getItem(key);if(!raw)return null;try{const parsed=JSON.parse(raw),info=inspectPackage(parsed);return {key,parsed,info}}catch(e){return {key,broken:true}}}).filter(Boolean)}catch(e){return []}}

function dueReviews(subject=null){const now=Date.now();return state.review.filter(r=>r.due<=now&&(!subject||QUESTION_MAP.get(r.id)?.subject===subject)).map(r=>QUESTION_MAP.get(r.id)).filter(Boolean)}
function recencySet(){return new Set(state.questionHistory.slice(-50).map(x=>x.id))}
function weightedPick(pool,n,subject){const recent=recencySet();const due=dueReviews(subject);const chosen=[];const addUnique=q=>{if(q&&!chosen.some(x=>x.id===q.id))chosen.push(q)};shuffle(due).forEach(q=>{if(chosen.length<n&&pool.some(x=>x.id===q.id))addUnique(q)});const weakUnits=Object.entries(state.unitStats).filter(([k,v])=>k.startsWith(subject+'|')&&(v.total||0)>=2&&(v.correct||0)/(v.total||1)<.7).map(([k])=>k.split('|')[1]);shuffle(pool.filter(q=>weakUnits.includes(q.unit)&&!recent.has(q.id))).forEach(q=>{if(chosen.length<n)addUnique(q)});shuffle(pool.filter(q=>!recent.has(q.id))).forEach(q=>{if(chosen.length<n)addUnique(q)});shuffle(pool).forEach(q=>{if(chosen.length<n)addUnique(q)});return chosen.slice(0,n)}

function rubyText(text){const root=document.createDocumentFragment(),keys=Object.keys(V11_RUBY).sort((a,b)=>b.length-a.length);let i=0,buffer='';const flush=()=>{if(buffer){root.appendChild(document.createTextNode(buffer));buffer=''}};while(i<String(text).length){const ch=String(text)[i];if(ch==='\n'){flush();root.appendChild(document.createElement('br'));i++;continue}const key=keys.find(k=>String(text).startsWith(k,i));if(key){flush();const ruby=document.createElement('ruby');ruby.appendChild(document.createTextNode(key));const rt=document.createElement('rt');rt.textContent=V11_RUBY[key];ruby.appendChild(rt);root.appendChild(ruby);i+=key.length}else{buffer+=ch;i++}}flush();return root}

function v11StarterSequence(day=state.totalSessions){const specs=V11_STARTER_SPECS[Math.min(2,Math.max(0,day))]||V11_STARTER_SPECS[0],used=new Set();return specs.map(([sub,unit,pred])=>{let q=QUESTIONS.find(x=>x.subject===sub&&x.unit===unit&&pred(x)&&!used.has(x.id));if(!q)q=QUESTIONS.find(x=>x.subject===sub&&x.unit===unit&&!v11IsAudioOnly(x)&&!used.has(x.id));if(q)used.add(q.id);return q}).filter(Boolean)}

currentStageMax=function(){const s=state.settings.stage;if(s==='pre'||s==='term1')return 1;if(s==='term2')return 2;if(s==='term3')return 3;const core=['こくご','さんすう'];const totals=core.reduce((a,k)=>a+(state.subjectStats[k]?.total||0),0),correct=core.reduce((a,k)=>a+(state.subjectStats[k]?.correct||0),0),pct=totals?correct/totals:0;let stage=1;if(state.totalSessions>=8&&totals>=40&&pct>=.78)stage=2;if(state.totalSessions>=25&&totals>=160&&pct>=.80&&dueReviews().length<18)stage=3;ensureV11();state.v11.autoStage=stage;return stage};
chooseQuestions=function(subject,n){const max=currentStageMax();let pool=QUESTIONS.filter(q=>q.subject===subject&&(q.stage??1)<=max&&q.difficulty<=Math.max(1,max));if(subject==='えいご'&&!v11HasEnglishVoice())pool=pool.filter(q=>!v11IsAudioOnly(q));if(!pool.length)pool=QUESTIONS.filter(q=>q.subject===subject&&!v11IsAudioOnly(q));let chosen=weightedPick(pool,n,subject);if(state.settings.stage==='auto'&&max>1){const fresh=pool.find(q=>(q.stage??1)===max&&!(state.questionStats[q.id]?.total));if(fresh&&chosen.length){chosen=[fresh,...chosen.filter(q=>q.id!==fresh.id)].slice(0,n)}}return chosen};
buildDailyQuestions=function(){if(state.totalSessions<3)return v11StarterSequence().slice(state.daily.answered);const target=effectivePlan(v11TodayGoal()),done=state.daily.subjects||{};let qs=[];Object.entries(target).forEach(([sub,n])=>{const remain=Math.max(0,n-(done[sub]||0));if(remain>0)qs.push(...chooseQuestions(sub,remain))});return shuffle(qs)};

function v11Choices(q,qz){if(q.type!=='choice')return [];qz.choiceCache=qz.choiceCache||{};if(qz.choiceCache[q.id])return qz.choiceCache[q.id];const three=state.totalSessions<3||currentStageMax()<=1||q.forceThree||qz.forceThree;let choices=[...q.choices];if(three&&choices.length>3){const wrong=choices.filter(x=>normalizeAnswer(x)!==normalizeAnswer(q.answer)).slice(0,2);choices=shuffle([q.answer,...wrong])}qz.choiceCache[q.id]=choices;return choices}

startQuiz=function(mode='daily',subject=null){let questions=[];if(mode==='daily'){if(!state.daily.goal)state.daily.goal=state.totalSessions<3?5:state.settings.dailyGoal;const remaining=Math.max(0,v11TodayGoal()-state.daily.answered);if(remaining===0){showToast('きょうの ぼうけんは できているよ');return}questions=buildDailyQuestions().slice(0,remaining)}else if(mode==='subject'){questions=chooseQuestions(subject,5)}else if(mode==='review'){questions=shuffle(dueReviews()).filter(q=>q.subject!=='えいご'||v11HasEnglishVoice()||!v11IsAudioOnly(q)).slice(0,5);if(!questions.length){showToast('いま ふくしゅうする もんだいは ないよ');return}}else if(mode==='boss'){const boss=currentBoss();if(!boss)return;questions=shuffle(Object.keys(SUBJECTS).flatMap(sub=>chooseQuestions(sub,1))).slice(0,3)}

updateStats=function(q,ok){const ss=state.subjectStats[q.subject]||(state.subjectStats[q.subject]={total:0,correct:0});ss.total++;if(ok)ss.correct++;const uk=`${q.subject}|${q.unit}`,us=state.unitStats[uk]||(state.unitStats[uk]={total:0,correct:0});us.total++;if(ok)us.correct++;const qs=state.questionStats[q.id]||(state.questionStats[q.id]={total:0,correct:0,selfCorrect:0,hintCorrect:0,unknown:0,audioPlays:0});qs.total++;if(ok){qs.correct++;if(state.quiz?.hintUsed)qs.hintCorrect++;else qs.selfCorrect++}if(state.quiz?.answeredUnknown)qs.unknown++;qs.audioPlays=(qs.audioPlays||0)+(state.quiz?.audioPlays||0);state.questionHistory.push({id:q.id,at:Date.now(),correct:ok,hintUsed:!!state.quiz?.hintUsed,unknown:!!state.quiz?.answeredUnknown,audioPlays:state.quiz?.audioPlays||0,subject:q.subject,unit:q.unit});state.questionHistory=state.questionHistory.slice(-500)};
submitAnswer=function(answer){const qz=state.quiz,q=qz.questions[qz.index];if(!q||qz.answered)return;if(v11IsAudioOnly(q)&&!qz.audioPlayed&&v11HasEnglishVoice()&&!qz.answeredUnknown){showToast('さきに えいごの おとを きいてみよう');return}const ok=normalizeAnswer(answer)===normalizeAnswer(q.answer);playTone(ok);qz.answered=true;qz.selected=String(answer);qz.results.push({id:q.id,subject:q.subject,correct:ok,hintUsed:!!qz.hintUsed,unknown:!!qz.answeredUnknown});if(ok){qz.wrongStreak=0;if(qz.mode==='review')markReviewCorrect(q)}else{qz.wrongStreak++;addReview(q)}updateStats(q,ok);qz.lastReward=grantQuestionReward(ok);if(qz.mode==='daily'){state.daily.answered++;if(ok)state.daily.correct++;state.daily.subjects[q.subject]=(state.daily.subjects[q.subject]||0)+1}save();render()};

function ensureV12(){
  ensureV11();

  const v=state.v12;
  if(!Object.prototype.hasOwnProperty.call(v,'englishHeard'))v.englishHeard=null;
  if(typeof v.englishTestPending!=='boolean')v.englishTestPending=false;
  if(!v.englishConfirmedAt)v.englishConfirmedAt=null;
  if(!['none',12,20].includes(v.studyLimit))v.studyLimit=12;
  if(v.extraDate!==today()){v.extraDate=today();v.extraAnswered=0;}
  if(!Number.isFinite(v.extraAnswered))v.extraAnswered=0;
  if(typeof v.inTrial!=='boolean')v.inTrial=false;
}

  if(last<src.length)root.appendChild(rubyText(src.slice(last)));return root;

  try{speechSynthesis.cancel();const voices=speechSynthesis.getVoices();parts.filter(x=>x&&String(x.text||'').trim()).forEach(part=>{const u=new SpeechSynthesisUtterance(String(part.text));u.lang=part.lang||'ja-JP';u.rate=u.lang.startsWith('en')?.75:.88;const v=voices.find(x=>String(x.lang||'').toLowerCase().startsWith(u.lang.slice(0,2).toLowerCase()));if(v)u.voice=v;speechSynthesis.speak(u)})}catch(e){}

function v12FindMiniReview(q,qz){

  const used=new Set(qz.questions.map(x=>x.id));let pool=QUESTIONS.filter(x=>x.subject===q.subject&&x.unit===q.unit&&x.id!==q.id&&!used.has(x.id)&&x.difficulty===1&&(!v11IsAudioOnly(x)||v11HasEnglishVoice()));

  const found=shuffle(pool)[0];return found?{...found,_v12MiniReview:true,_v12SourceUnit:q.unit,forceThree:true}:null;
}

const v13BaseCurrentStageMax=currentStageMax;
function v13SubjectStageMax(subject){
  const base=v13BaseCurrentStageMax();
  if(subject==='えいご'||!v13Challenge())return base;
  return Math.min(3,Math.max(2,base+1));
}
function v13UniqueAdd(out,rows,n){for(const q of rows){if(out.length>=n)break;if(q&&!out.some(x=>x.id===q.id))out.push(q)}return out}
const v13BaseChooseQuestions=chooseQuestions;
chooseQuestions=function(subject,n){
  ensureV13();
  if(subject==='えいご'||!v13Challenge())return v13BaseChooseQuestions(subject,n);
  const max=v13SubjectStageMax(subject),recent=recencySet();
  let pool=QUESTIONS.filter(q=>q.subject===subject&&(q.stage??1)<=max&&(q.difficulty??1)<=max);
  if(!pool.length)return v13BaseChooseQuestions(subject,n);
  const due=dueReviews(subject).filter(q=>pool.some(x=>x.id===q.id));
  const easyUnits=V13_EASY_UNITS[subject]||new Set();
  let preferred=pool.filter(q=>(q.stage??1)>=2&&((q.difficulty??1)>=2||!easyUnits.has(q.unit)));
  if(preferred.length<n)preferred=pool.filter(q=>(q.stage??1)>=2||(q.difficulty??1)>=2);
  const out=[];
  v13UniqueAdd(out,shuffle(due).slice(0,1),n);
  const hardTarget=Math.max(out.length,Math.ceil(n*.7));
  const hardCandidates=weightedPick(preferred,Math.min(preferred.length,Math.max(n*4,16)),subject)
    .sort((a,b)=>((b.stage??1)*3+(b.difficulty??1)*2-(recent.has(b.id)?3:0))-((a.stage??1)*3+(a.difficulty??1)*2-(recent.has(a.id)?3:0)));
  v13UniqueAdd(out,hardCandidates,hardTarget);
  v13UniqueAdd(out,weightedPick(pool,Math.min(pool.length,Math.max(n*4,20)),subject),n);
  v13UniqueAdd(out,shuffle(pool),n);
  return shuffle(out.slice(0,n));
};

 const start=async()=>{try{const reg=await navigator.serviceWorker.register('./sw.js',{scope:'./',updateViaCache:'none'});await navigator.serviceWorker.ready;if(!localStorage.getItem(OFFLINE_READY_KEY))localStorage.setItem(OFFLINE_READY_KEY,'1');if(reg.waiting)reg.waiting.postMessage({type:'SKIP_WAITING'})}catch(e){console.warn('Offline setup failed',e)}};
 if(document.readyState==='complete')start();else window.addEventListener('load',start,{once:true});
}
function renderOfflineSupportCard(){const sw='serviceWorker'in navigator;return el('div',{className:'card section offlineSupportCard'},[el('div',{className:'sectionTitle'},'オフライン利用'),el('div',{className:'small'},'一度オンラインで開くと、その後は通信がなくても学習できます。GitHub Pagesの同じURLで使ってください。'),el('div',{className:'offlineSupportGrid'},[el('div',{className:'offlineSupportStat'},[el('b',{},navigator.onLine?'🌐 オンライン':'📴 オフライン'),navigator.onLine?'最新データを確認できます。':'保存済みデータで遊べます。']),el('div',{className:'offlineSupportStat'},[el('b',{},sw?'✅ オフライン対応':'⚠️ 非対応'),sw?'Service Workerを利用できます。':'このブラウザでは利用できません。'])]),el('div',{className:'grid2',style:{marginTop:'9px'}},[el('button',{className:'secondary',disabled:!sw||!navigator.onLine,onclick:()=>offlineCacheNow(true)},'オフラインデータを更新'),el('button',{className:'secondary',onclick:offlineInstallApp},'ホーム画面に追加')]),el('div',{className:'small',style:{marginTop:'8px'}},'初回だけはオンライン接続が必要です。ブラウザの履歴・サイトデータを削除すると、オフラインデータと学習記録も消えることがあります。')])}
const offlineBaseRenderParent=renderParent;
renderParent=function(){const wrap=offlineBaseRenderParent();const card=renderOfflineSupportCard(),hold=wrap.querySelector('.parentHold');wrap.insertBefore(card,hold||null);return wrap};


/* ================= Ver.1.4.2 story progress reset ================= */
APP.version='1.4.2';
document.title='はじまりのクリスタル Ver.1.4.2';
// Ver.1.4.3: ordinary offline operation is intentionally silent.
document.title='はじまりのクリスタル Ver.1.4.3';

const SR_MAIN_STORY_IDS=new Set(STORY_EPISODES.map(x=>x.id));
const srBaseEnsureLongTermState=ensureLongTermState;
ensureLongTermState=function(){
  const lt=srBaseEnsureLongTermState();
  if(!lt.storyReplay||typeof lt.storyReplay!=='object')lt.storyReplay={};
  const sr=lt.storyReplay;
  sr.active=!!sr.active;
  sr.baseTotalSessions=Math.max(0,Math.min(Number(state.totalSessions)||0,Number(sr.baseTotalSessions)||0));
  sr.resetCount=Math.max(0,Math.floor(Number(sr.resetCount)||0));
  sr.resetAt=sr.resetAt||null;
  sr.bossProgress=sr.bossProgress&&typeof sr.bossProgress==='object'?sr.bossProgress:{};
  sr.bossCleared=Array.isArray(sr.bossCleared)?[...new Set(sr.bossCleared.filter(id=>BOSSES.some(b=>b.id===id)))]:[];
  sr.mapRewardedCycles=Math.max(0,Math.floor(Number(sr.mapRewardedCycles)||0));
  return lt;
};
function srState(){return ensureLongTermState().storyReplay}
function srActive(){return !!srState().active}
function srStorySessions(){const sr=srState();return sr.active?Math.max(0,(state.totalSessions||0)-sr.baseTotalSessions):Math.max(0,state.totalSessions||0)}
function srBossProgress(id){return srActive()?Math.max(0,Number(srState().bossProgress[id])||0):Math.max(0,Number(state.bossProgress?.[id])||0)}
function srBossCleared(id){return srActive()?srState().bossCleared.includes(id):state.bossCleared.includes(id)}

currentStoryUnlockCount=function(){return Math.min(STORY_EPISODES.length,srStorySessions())};
currentBoss=function(){return BOSSES.find((boss,index)=>srStorySessions()>=(index+1)*5&&!srBossCleared(boss.id))||null};
bossAvailable=function(){return !!currentBoss()};
ltMapStatus=function(){const total=srStorySessions();if(total===0)return {cycle:1,completed:0,theme:LT_MAP_THEMES[0]};const cycle=Math.ceil(total/LT_MAP_DAYS),completed=total-(cycle-1)*LT_MAP_DAYS;return {cycle,completed,theme:LT_MAP_THEMES[(cycle-1)%LT_MAP_THEMES.length]}};
ltJourneyCycleCompleted=function(cycle){const total=srStorySessions(),start=(Math.max(1,cycle)-1)*LT_MAP_DAYS;return Math.max(0,Math.min(LT_MAP_DAYS,total-start))};

const srBaseCompleteDailyIfNeeded=completeDailyIfNeeded;
completeDailyIfNeeded=function(){
  const sr=srState(),replay=sr.active;
  if(replay){
    const lt=ensureLongTermState(),anticipatedRawCycle=Math.floor(((state.totalSessions||0)+1)/LT_MAP_DAYS);
    /* The old map reward code follows totalSessions. Keep it from firing at the wrong replay day. */
    lt.map.rewardedCycles=Math.max(lt.map.rewardedCycles||0,anticipatedRawCycle);
    lt.map.pendingCelebration=null;
  }
  const completed=srBaseCompleteDailyIfNeeded();
  if(!completed||!replay)return completed;
  const lt=ensureLongTermState(),storyCycles=Math.floor(srStorySessions()/LT_MAP_DAYS);
  if(storyCycles>sr.mapRewardedCycles){
    const gained=storyCycles-sr.mapRewardedCycles;sr.mapRewardedCycles=storyCycles;
    state.coins+=50*gained;state.light+=30*gained;state.xp+=30*gained;
    lt.map.pendingCelebration={cycle:storyCycles,at:Date.now(),storyReplay:true};
    createAutoBackup('物語30日マップ達成',true);
  }else if(lt.map.pendingCelebration&&!lt.map.pendingCelebration.storyReplay){lt.map.pendingCelebration=null}
  return completed;
};

const srBaseFinishQuiz=finishQuiz;
finishQuiz=function(){
  const qz=state.quiz;
  if(qz?.mode!=='boss'||!qz.boss||!srActive())return srBaseFinishQuiz();
  const sr=srState(),id=qz.boss.id,ok=qz.results.filter(r=>r.correct).length,old=Math.max(0,Number(sr.bossProgress[id])||0),now=Math.min(3,old+ok),newlyCleared=now>=3&&!sr.bossCleared.includes(id),everCleared=state.bossCleared.includes(id);
  sr.bossProgress[id]=now;
  if(newlyCleared){
    sr.bossCleared.push(id);
    if(!everCleared){state.bossProgress[id]=3;state.bossCleared.push(id);state.coins+=35;state.light+=20}
  }else if(!everCleared){state.bossProgress[id]=Math.max(Number(state.bossProgress[id])||0,now)}
  qz.newlyCompleted=false;state.screen='result';save();render();
};

function srWithReplayBossProgress(renderer){
  if(!srActive())return renderer();
  const original=state.bossProgress;state.bossProgress=srState().bossProgress;
  try{return renderer()}finally{state.bossProgress=original}
}
const srBaseRenderHome=renderHome;
renderHome=function(){return srWithReplayBossProgress(()=>srBaseRenderHome())};
const srBaseRenderBoss=renderBoss;
renderBoss=function(){return srWithReplayBossProgress(()=>srBaseRenderBoss())};
const srBaseRenderResult=renderResult;
renderResult=function(){return srWithReplayBossProgress(()=>srBaseRenderResult())};

function srApplyStoryReset(){
  const lt=ensureLongTermState(),sr=lt.storyReplay;
  createAutoBackup('物語リセット前',true);
  sr.active=true;sr.baseTotalSessions=Math.max(0,state.totalSessions||0);sr.resetCount=(sr.resetCount||0)+1;sr.resetAt=new Date().toISOString();
  sr.bossProgress={};sr.bossCleared=[];
  sr.mapRewardedCycles=Math.max(sr.mapRewardedCycles||0,Number(lt.map?.rewardedCycles)||0);
  state.storyRead=(state.storyRead||[]).filter(id=>!SR_MAIN_STORY_IDS.has(id));
  state.currentStoryId=null;state.storyPage=0;
  if(lt.cycleStories){lt.cycleStories.read=[];lt.cycleStories.pendingId=null}
  if(lt.map)lt.map.pendingCelebration=null;
  state.quiz=null;state.screen='home';save();createAutoBackup('物語リセット後',true);render();
  return true;
}
function srConfirmStoryReset(){
  const learned=totalAnswered(),correct=totalCorrect();
  const message=`物語だけを最初から始めます。\n\nリセットするもの\n・メインストーリー24話\n・通常ボス4体の物語上の進行\n・30日マップと周回物語\n\n残すもの\n・${learned}問の回答歴と${correct}問の正答歴\n・間違い問題と復習予定\n・XP、コイン、町、仲間、衣装\n・ボスチャレンジ、クリスタル、シール\n\n実行前の自動バックアップも作成します。続けますか？`;
  if(!confirm(message))return false;
  srApplyStoryReset();showToast('物語を さいしょから はじめます');return true;
}
function srRenderParentCard(){
  const sr=srState(),storyDays=srStorySessions(),mainRead=(state.storyRead||[]).filter(id=>SR_MAIN_STORY_IDS.has(id)).length;
  return el('div',{className:'card section'},[
    el('div',{className:'sectionTitle'},['物語の進行',el('span',{className:'small'},sr.active?'リスタート中':'通常進行')]),
    el('div',{className:'small'},sr.active?`学習記録は累計 ${state.totalSessions||0}日分を維持したまま、物語は ${storyDays}日目として進行しています。メイン物語 ${mainRead}/24話、通常ボス ${sr.bossCleared.length}/4体です。`:`現在は学習完了日数と物語が同じ進行です。メイン物語 ${mainRead}/24話、通常ボス ${state.bossCleared.length}/4体です。`),
    sr.active?el('div',{className:'note',style:{marginTop:'9px'}},`物語リセット ${sr.resetCount}回。正答歴・復習・町・仲間・収集物はリセットされていません。`):null,
    el('button',{className:'secondary',style:{marginTop:'10px',borderColor:'rgba(255,150,70,.38)'},onclick:srConfirmStoryReset},sr.active?'物語を もう一度 最初から':'物語だけを 最初から')
  ]);
}
const srBaseRenderParent=renderParent;
renderParent=function(){
  const wrap=srBaseRenderParent(),fullReset=[...wrap.querySelectorAll('button')].find(b=>b.textContent.includes('学習データを リセット')),card=srRenderParentCard();
  if(fullReset)wrap.insertBefore(card,fullReset);else wrap.appendChild(card);return wrap;
};

const srBaseDiagnostics=diagnostics;
diagnostics=function(){const rows=srBaseDiagnostics(),sr=srState();rows.push({name:'物語リセット',ok:true,text:sr.active?`学習記録を維持し、物語 ${srStorySessions()}日目として再進行中。リセット${sr.resetCount}回。`:'学習記録を消さずに物語・通常ボス・30日マップだけをリセットできます。'});return rows};

function boot(){applyMotionSetting();render();registerOfflineSupport();setTimeout(()=>{try{speechSynthesis.getVoices()}catch(e){}},100)}
boot();
</script>
